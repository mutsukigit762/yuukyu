  <script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect, useRef } = React;

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function parseDate(str) { return new Date(str + "T00:00:00"); }

function formatDate(str) {
  const d = parseDate(str);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}`;
}

function daysBetween(a, b) {
  return Math.round((parseDate(b) - parseDate(a)) / 86400000);
}

function todayStr() { return new Date().toISOString().slice(0, 10); }

function calcBalances(grants, usages) {
  const sortedGrants = [...grants].sort((a, b) => a.date.localeCompare(b.date));
  const sortedUsages = [...usages].sort((a, b) => a.date.localeCompare(b.date));
  const today = todayStr();
  const activeGrants = sortedGrants.filter(g => g.expireDate >= today);
  const expiredGrants = sortedGrants.filter(g => g.expireDate < today);
  const remaining = activeGrants.map(g => ({ ...g, rem: g.days }));
  let usagePool = [...sortedUsages];

  for (const eg of expiredGrants) {
    let pool = eg.days;
    usagePool = usagePool.map(u => {
      if (pool <= 0 || u.days <= 0) return u;
      const consume = Math.min(pool, u.days);
      pool -= consume;
      return { ...u, days: u.days - consume };
    });
  }

  for (const r of remaining) {
    usagePool = usagePool.map(u => {
      if (r.rem <= 0 || u.days <= 0) return u;
      const consume = Math.min(r.rem, u.days);
      r.rem -= consume;
      return { ...u, days: u.days - consume };
    });
  }

  return remaining.map(r => {
    const daysUntilExpiry = daysBetween(today, r.expireDate);
    return { grant: r, remaining: Math.max(0, r.rem), daysUntilExpiry };
  });
}

// 今年度（4月始まり）の消化日数と義務残日数を計算
function calcObligationProgress(usages) {
  const today = new Date();
  const month = today.getMonth() + 1;
  const year = today.getFullYear();
  const fyStart = month >= 4 ? `${year}-04-01` : `${year - 1}-04-01`;
  const fyEnd   = month >= 4 ? `${year + 1}-03-31` : `${year}-03-31`;
  const taken = usages
    .filter(u => u.date >= fyStart && u.date <= fyEnd)
    .reduce((s, u) => s + u.days, 0);
  const remaining = Math.max(0, 5 - taken);
  return { taken, remaining, fyStart, fyEnd };
}

function calcNextGrant(grants) {
  const today = todayStr();
  const future = grants.filter(g => g.date > today).sort((a,b) => a.date.localeCompare(b.date));
  if (!future.length) return null;
  return { date: future[0].date, daysUntil: daysBetween(today, future[0].date) };
}

// ── モーダル ──
function Modal({ title, onClose, children }) {
  const el = React.useMemo(() => document.body, []);
  return ReactDOM.createPortal(
    <div style={{
      position:"fixed",top:0,bottom:0,left:0,right:0,
      background:"rgba(0,0,0,0.5)",
      display:"flex",alignItems:"flex-end",justifyContent:"center",
      zIndex:200
    }} onClick={e => e.target===e.currentTarget && onClose()}>
      <div style={{
        background:"#1c1f26",borderRadius:"20px 20px 0 0",
        padding:"28px 24px",
        width:"100%",maxWidth:480,
        boxSizing:"border-box",
        paddingBottom:"calc(32px + env(safe-area-inset-bottom, 0px))"
      }}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
          <span style={{fontSize:17,fontWeight:700,color:"#f0f0f0"}}>{title}</span>
          <button onClick={onClose} style={{
            background:"rgba(255,255,255,0.08)",border:"none",color:"#aaa",
            borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:18
          }}>×</button>
        </div>
        {children}
      </div>
    </div>,
    el
  );
}

function Field({ label, children }) {
  return (
    <div style={{marginBottom:20}}>
      <label style={{display:"block",fontSize:12,color:"#8a8f9e",marginBottom:8,letterSpacing:"0.05em",textTransform:"uppercase"}}>{label}</label>
      {children}
    </div>
  );
}

const inputStyle = {
  width:"100%",boxSizing:"border-box",minWidth:0,
  background:"rgba(255,255,255,0.06)",border:"1.5px solid rgba(255,255,255,0.1)",
  borderRadius:10,color:"#f0f0f0",fontSize:16,padding:"12px 14px",outline:"none",
  display:"block"
};

// ── 付与モーダル ──
function GrantModal({ onClose, onSave }) {
  const [date, setDate] = useState(todayStr());
  const [days, setDays] = useState("20");
  const [expireDate, setExpireDate] = useState("");

  useEffect(() => {
    if (date) {
      const y = parseInt(date.slice(0,4)) + 2;
      const baseMonth = parseInt(date.slice(5,7));
      const expY = baseMonth >= 4 ? y : y - 1;
      setExpireDate(`${expY}-03-31`);
    }
  }, [date]);

  function handleSave() {
    if (!date || !days || !expireDate || parseFloat(days) <= 0) return;
    onSave({ id:genId(), date, days:parseFloat(days), expireDate });
    onClose();
  }

  return (
    <Modal title="付与を記録" onClose={onClose}>
      <Field label="付与日">
        <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={inputStyle} />
      </Field>
      <Field label="付与日数">
        <input type="number" value={days} onChange={e=>setDays(e.target.value)}
          step="0.5" min="0.5" style={inputStyle} placeholder="20" />
      </Field>
      <Field label="失効日（自動計算・変更可）">
        <input type="date" value={expireDate} onChange={e=>setExpireDate(e.target.value)} style={inputStyle} />
      </Field>
      <button onClick={handleSave} style={{
        width:"100%",padding:"14px",background:"#4a6fa5",
        border:"none",borderRadius:12,color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer",marginTop:4
      }}>記録する</button>
    </Modal>
  );
}

// ── 消化モーダル ──
function UsageModal({ onClose, onSave }) {
  const [date, setDate] = useState(todayStr());
  const [days, setDays] = useState("1");

  function handleSave() {
    if (!date || !days || parseFloat(days) <= 0) return;
    onSave({ id:genId(), date, days:parseFloat(days) });
    onClose();
  }

  const presets = ["0.5","1","2","3"];

  return (
    <Modal title="消化を記録" onClose={onClose}>
      <Field label="消化日">
        <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={inputStyle} />
      </Field>
      <Field label="消化日数">
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          {presets.map(p => (
            <button key={p} onClick={()=>setDays(p)} style={{
              flex:1,padding:"10px 0",
              background:days===p?"#7c5cbf":"rgba(255,255,255,0.06)",
              border:days===p?"1.5px solid #7c5cbf":"1.5px solid rgba(255,255,255,0.1)",
              borderRadius:10,color:days===p?"#fff":"#aaa",
              fontSize:15,fontWeight:days===p?700:400,cursor:"pointer"
            }}>{p}日</button>
          ))}
        </div>
        <input type="number" value={days} onChange={e=>setDays(e.target.value)}
          step="0.5" min="0.5" style={inputStyle} placeholder="その他" />
      </Field>
      <button onClick={handleSave} style={{
        width:"100%",padding:"14px",background:"#7c5cbf",
        border:"none",borderRadius:12,color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer",marginTop:4
      }}>記録する</button>
    </Modal>
  );
}

// ── ホーム ──
function HomeScreen({ grants, usages, onAddGrant, onAddUsage }) {
  const balances = useMemo(() => calcBalances(grants, usages), [grants, usages]);
  const totalRemaining = balances.reduce((s,b) => s+b.remaining, 0);
  const nextGrant = useMemo(() => calcNextGrant(grants), [grants]);
  const urgentBalances = balances.filter(b => b.daysUntilExpiry <= 90 && b.remaining > 0);
  const obligation = useMemo(() => calcObligationProgress(usages), [usages]);

  function formatExpiry(days) {
    if (days <= 0) return "失効済み";
    if (days < 30) return `あと${days}日で失効`;
    if (days < 365) return `あと${Math.round(days/30)}ヶ月で失効`;
    const y = Math.floor(days/365);
    const m = Math.round((days%365)/30);
    return m > 0 ? `あと${y}年${m}ヶ月で失効` : `あと${y}年で失効`;
  }

  return (
    <div>
      <div style={{
        background:"linear-gradient(135deg,#1a2744 0%,#2a1f4e 100%)",
        borderRadius:20,padding:"32px 28px",marginBottom:16,textAlign:"center"
      }}>
        <div style={{fontSize:13,color:"#8a9fc0",letterSpacing:"0.1em",marginBottom:12}}>現在の有給残日数</div>
        <div style={{fontSize:64,fontWeight:800,color:"#fff",lineHeight:1,letterSpacing:"-0.02em"}}>
          {totalRemaining%1===0?totalRemaining:totalRemaining.toFixed(1)}
        </div>
        <div style={{fontSize:18,color:"#8a9fc0",marginTop:6}}>日</div>
      </div>

      {urgentBalances.map(b => (
        <div key={b.grant.id} style={{
          background:"rgba(220,100,60,0.15)",border:"1px solid rgba(220,100,60,0.3)",
          borderRadius:12,padding:"12px 16px",marginBottom:12,
          display:"flex",alignItems:"center",gap:10,color:"#f09070"
        }}>
          <IconAlert />
          <span style={{fontSize:14}}>
            {formatDate(b.grant.date)}付与分 {b.remaining}日 が{formatExpiry(b.daysUntilExpiry)}
          </span>
        </div>
      ))}

      <div style={{background:"#1c1f26",borderRadius:16,padding:"4px 0",marginBottom:16}}>
        {balances.length === 0 && (
          <div style={{padding:"20px",textAlign:"center",color:"#445",fontSize:14}}>
            付与が登録されていません
          </div>
        )}
        {balances.map((b,i) => {
          const isUrgent = b.daysUntilExpiry <= 90;
          const isWarning = b.daysUntilExpiry <= 180;
          const accentColor = isUrgent?"#dc6440":isWarning?"#c8a020":"#4a6fa5";
          return (
            <div key={b.grant.id} style={{
              padding:"16px 20px",
              borderBottom:i<balances.length-1?"1px solid rgba(255,255,255,0.06)":"none",
              display:"flex",justifyContent:"space-between",alignItems:"center"
            }}>
              <div>
                <div style={{fontSize:14,color:"#c0c8d8",marginBottom:4}}>
                  {formatDate(b.grant.date)} 付与
                </div>
                <div style={{fontSize:12,color:isUrgent?"#dc6440":"#556070"}}>
                  {isUrgent&&<span style={{marginRight:4}}>⚠</span>}
                  {formatExpiry(b.daysUntilExpiry)}
                </div>
              </div>
              <div style={{textAlign:"right"}}>
                <span style={{fontSize:24,fontWeight:700,color:accentColor}}>
                  {b.remaining%1===0?b.remaining:b.remaining.toFixed(1)}
                </span>
                <span style={{fontSize:13,color:"#556070",marginLeft:4}}>日</span>
              </div>
            </div>
          );
        })}
      </div>

      {nextGrant && (
        <div style={{
          background:"#1c1f26",borderRadius:16,padding:"16px 20px",
          marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"center"
        }}>
          <span style={{fontSize:14,color:"#8a8f9e"}}>次回付与予定</span>
          <div style={{textAlign:"right"}}>
            <span style={{fontSize:14,color:"#c0c8d8"}}>{formatDate(nextGrant.date)}</span>
            <span style={{fontSize:12,color:"#556070",marginLeft:8}}>（あと{nextGrant.daysUntil}日）</span>
          </div>
        </div>
      )}

      {/* 年5日義務の進捗 */}
      <div style={{background:"#1c1f26",borderRadius:16,padding:"16px 20px",marginBottom:16}}>
        <div style={{fontSize:12,color:"#8a8f9e",marginBottom:12,letterSpacing:"0.05em",textTransform:"uppercase"}}>年5日消化義務</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <span style={{fontSize:13,color:"#8a9fc0"}}>今年度消化済み</span>
          <span style={{fontSize:16,fontWeight:700,color:"#c0c8d8"}}>
            {obligation.taken%1===0?obligation.taken:obligation.taken.toFixed(1)}日
          </span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <span style={{fontSize:13,color:"#8a9fc0"}}>義務まで残り</span>
          <span style={{fontSize:16,fontWeight:700,color:"#c0c8d8"}}>
            {obligation.remaining%1===0?obligation.remaining:obligation.remaining.toFixed(1)}日
          </span>
        </div>
        {/* プログレスバー */}
        <div style={{background:"rgba(255,255,255,0.07)",borderRadius:99,height:6,overflow:"hidden"}}>
          <div style={{
            height:"100%",borderRadius:99,
            width:`${Math.min(100, (obligation.taken/5)*100)}%`,
            background: obligation.taken >= 5 ? "#4a9a6a" : "#4a6fa5",
            transition:"width 0.4s ease"
          }}/>
        </div>
      </div>

      <div style={{display:"flex",gap:12}}>
        <button onClick={onAddUsage} style={{
          flex:1,padding:"16px",background:"#7c5cbf",
          border:"none",borderRadius:14,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",
          display:"flex",alignItems:"center",justifyContent:"center",gap:8
        }}>
          <IconPlus /> 消化を記録
        </button>
        <button onClick={onAddGrant} style={{
          flex:1,padding:"16px",background:"rgba(74,111,165,0.25)",
          border:"1.5px solid rgba(74,111,165,0.4)",
          borderRadius:14,color:"#7a9fd0",fontSize:15,fontWeight:700,cursor:"pointer",
          display:"flex",alignItems:"center",justifyContent:"center",gap:8
        }}>
          <IconPlus /> 付与を記録
        </button>
      </div>
    </div>
  );
}

// ── 履歴 ──
function HistoryScreen({ grants, usages, onDeleteGrant, onDeleteUsage }) {
  const allItems = useMemo(() => {
    const g = grants.map(x => ({...x, type:"grant"}));
    const u = usages.map(x => ({...x, type:"usage"}));
    return [...g,...u].sort((a,b) => b.date.localeCompare(a.date));
  }, [grants, usages]);

  const [deleteTarget, setDeleteTarget] = useState(null);

  function handleDelete(item) {
    if (item.type==="grant") onDeleteGrant(item.id);
    else onDeleteUsage(item.id);
    setDeleteTarget(null);
  }

  return (
    <div>
      <h2 style={{fontSize:18,fontWeight:700,color:"#f0f0f0",marginBottom:20,marginTop:0}}>履歴</h2>
      {allItems.length===0&&(
        <div style={{textAlign:"center",color:"#445",padding:"60px 0",fontSize:14}}>まだ記録がありません</div>
      )}
      <div style={{background:"#1c1f26",borderRadius:16,overflow:"hidden"}}>
        {allItems.map((item,i) => {
          const isGrant = item.type==="grant";
          const color = isGrant?"#4a6fa5":"#7c5cbf";
          const sign = isGrant?"+":"−";
          return (
            <div key={item.id} style={{
              padding:"14px 18px",
              borderBottom:i<allItems.length-1?"1px solid rgba(255,255,255,0.06)":"none",
              display:"flex",alignItems:"center",gap:12
            }}>
              <div style={{width:8,height:8,borderRadius:"50%",background:color,flexShrink:0}} />
              <div style={{flex:1}}>
                <div style={{fontSize:14,color:"#c0c8d8"}}>
                  {formatDate(item.date)}
                  <span style={{
                    marginLeft:10,fontSize:12,
                    background:isGrant?"rgba(74,111,165,0.2)":"rgba(124,92,191,0.2)",
                    color:color,borderRadius:5,padding:"2px 7px"
                  }}>{isGrant?"付与":"消化"}</span>
                </div>
                {isGrant&&item.expireDate&&(
                  <div style={{fontSize:11,color:"#445566",marginTop:3}}>失効 {formatDate(item.expireDate)}</div>
                )}
              </div>
              <div style={{fontSize:18,fontWeight:700,color:color,minWidth:52,textAlign:"right"}}>
                {sign}{item.days%1===0?item.days:item.days.toFixed(1)}日
              </div>
              <button onClick={()=>setDeleteTarget(item)} style={{
                background:"none",border:"none",color:"#445",cursor:"pointer",
                padding:"4px",display:"flex",alignItems:"center"
              }}><IconTrash /></button>
            </div>
          );
        })}
      </div>

      {deleteTarget&&(
        <Modal title="削除の確認" onClose={()=>setDeleteTarget(null)}>
          <p style={{color:"#8a8f9e",fontSize:14,marginBottom:24}}>
            {formatDate(deleteTarget.date)} の{deleteTarget.type==="grant"?"付与":"消化"}記録（{deleteTarget.days}日）を削除しますか？
          </p>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>setDeleteTarget(null)} style={{
              flex:1,padding:"12px",background:"rgba(255,255,255,0.06)",
              border:"none",borderRadius:10,color:"#aaa",fontSize:15,cursor:"pointer"
            }}>キャンセル</button>
            <button onClick={()=>handleDelete(deleteTarget)} style={{
              flex:1,padding:"12px",background:"#8b2020",
              border:"none",borderRadius:10,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer"
            }}>削除する</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── メイン ──
function App() {
  const [grants, setGrants] = useState([]);
  const [usages, setUsages] = useState([]);
  const [loading, setLoading] = useState(true);
  const [screenIdx, setScreenIdx] = useState(0);
  const [modal, setModal] = useState(null);

  // Firestoreリアルタイム購読
  useEffect(() => {
    const { collection, onSnapshot, query, orderBy } = window._firebase;
    const db = window._db;
    const col = window._col;

    const setup = () => {
      const unsubGrants = onSnapshot(
        query(collection(db, col.grants), orderBy("date", "asc")),
        snap => {
          setGrants(snap.docs.map(d => ({ ...d.data(), id: d.id })));
          setLoading(false);
        }
      );
      const unsubUsages = onSnapshot(
        query(collection(db, col.usages), orderBy("date", "asc")),
        snap => setUsages(snap.docs.map(d => ({ ...d.data(), id: d.id })))
      );
      return () => { unsubGrants(); unsubUsages(); };
    };

    if (window._firebaseReady) return setup();
    const handler = () => setup();
    window.addEventListener("firebaseReady", handler);
    return () => window.removeEventListener("firebaseReady", handler);
  }, []);

  async function addGrant(g) {
    const { collection, addDoc } = window._firebase;
    await addDoc(collection(window._db, window._col.grants), g);
  }
  async function addUsage(u) {
    const { collection, addDoc } = window._firebase;
    await addDoc(collection(window._db, window._col.usages), u);
  }
  async function deleteGrant(id) {
    const { doc, deleteDoc } = window._firebase;
    await deleteDoc(doc(window._db, window._col.grants, id));
  }
  async function deleteUsage(id) {
    const { doc, deleteDoc } = window._firebase;
    await deleteDoc(doc(window._db, window._col.usages, id));
  }

  const tabs = [
    {id:"home",label:"ホーム",icon:<IconHome/>},
    {id:"history",label:"履歴",icon:<IconHistory/>},
  ];
  const NAV_H = 60;

  // ── スワイプ検出 ──
  const touchStartX = React.useRef(null);
  const touchStartY = React.useRef(null);
  const SWIPE_THRESHOLD = 50;

  function onTouchStart(e) {
    touchStartX.current = e.touches[0].clientX;
    touchStartY.current = e.touches[0].clientY;
  }

  function onTouchEnd(e) {
    if (touchStartX.current === null || modal) return;
    const dx = e.changedTouches[0].clientX - touchStartX.current;
    const dy = e.changedTouches[0].clientY - touchStartY.current;
    // 縦スクロールが主体のときは無視
    if (Math.abs(dy) > Math.abs(dx)) return;
    if (Math.abs(dx) < SWIPE_THRESHOLD) return;
    if (dx < 0) setScreenIdx(i => Math.min(i + 1, tabs.length - 1)); // 左スワイプ→次
    if (dx > 0) setScreenIdx(i => Math.max(i - 1, 0));               // 右スワイプ→前
    touchStartX.current = null;
  }

  if (loading) return (
    <div style={{
      position:"fixed", inset:0, background:"#12141a",
      display:"flex", alignItems:"center", justifyContent:"center",
      color:"#445566", fontSize:14,
      fontFamily:"-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif"
    }}>読み込み中...</div>
  );

  return (
    <div style={{
      position:"fixed", inset:0,
      background:"#12141a", color:"#f0f0f0",
      fontFamily:"-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif",
      display:"flex", flexDirection:"column",
      maxWidth:480, margin:"0 auto"
    }}>
      {/* スライドコンテナ */}
      <div
        onTouchStart={onTouchStart}
        onTouchEnd={onTouchEnd}
        style={{
          flex:1, overflow:"hidden", position:"relative"
        }}
      >
        {/* 2画面を横に並べてtranslateXで切り替え */}
        <div style={{
          display:"flex",
          width:`${tabs.length * 100}%`,
          height:"100%",
          transform:`translateX(${-screenIdx * (100 / tabs.length)}%)`,
          transition:"transform 0.28s cubic-bezier(0.4,0,0.2,1)"
        }}>
          {/* ホーム */}
          <div
            className="scroll-area"
            style={{
              width:`${100 / tabs.length}%`, flexShrink:0, height:"100%",
              overflowY:"auto",
              paddingTop:"calc(env(safe-area-inset-top, 0px) + 20px)",
              paddingLeft:16, paddingRight:16,
              paddingBottom:`calc(env(safe-area-inset-bottom, 0px) + ${NAV_H + 20}px)`
            }}
          >
            <HomeScreen grants={grants} usages={usages}
              onAddGrant={()=>setModal("grant")} onAddUsage={()=>setModal("usage")} />
          </div>

          {/* 履歴 */}
          <div
            className="scroll-area"
            style={{
              width:`${100 / tabs.length}%`, flexShrink:0, height:"100%",
              overflowY:"auto",
              paddingTop:"calc(env(safe-area-inset-top, 0px) + 20px)",
              paddingLeft:16, paddingRight:16,
              paddingBottom:`calc(env(safe-area-inset-bottom, 0px) + ${NAV_H + 20}px)`
            }}
          >
            <HistoryScreen grants={grants} usages={usages}
              onDeleteGrant={deleteGrant} onDeleteUsage={deleteUsage} />
          </div>
        </div>
      </div>

      {/* ボトムナビ */}
      <div style={{
        position:"absolute", bottom:0, left:0, right:0,
        background:"#1c1f26",
        borderTop:"1px solid rgba(255,255,255,0.08)",
        display:"flex", justifyContent:"space-around",
        paddingTop:10,
        paddingBottom:"env(safe-area-inset-bottom, 16px)",
        minHeight:NAV_H, flexShrink:0
      }}>
        {tabs.map((t,i) => (
          <button key={t.id} onClick={()=>setScreenIdx(i)} style={{
            background:"none", border:"none", cursor:"pointer",
            display:"flex", flexDirection:"column", alignItems:"center", gap:4,
            color:screenIdx===i?"#7a9fd0":"#445566",
            fontSize:11, fontWeight:screenIdx===i?700:400, padding:"4px 24px"
          }}>
            {t.icon}{t.label}
          </button>
        ))}
      </div>

      {modal==="grant"&&<GrantModal onClose={()=>setModal(null)} onSave={addGrant}/>}
      {modal==="usage"&&<UsageModal onClose={()=>setModal(null)} onSave={addUsage}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

// Service Worker 登録
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
  </script>
</body>
</html>
